<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ジュアン・ジェイ FD名決定</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
--bg:#14202E;
--gold:#C9A84C;
--gold-dim:rgba(201,168,76,0.35);
--text:#F0E8D4;
--text-mid:rgba(240,232,212,0.72);
}

*{box-sizing:border-box;margin:0;padding:0}

body{
background:var(--bg);
color:var(--text);
font-family:"Noto Serif JP",serif;
}

.wrapper{
max-width:1000px;
margin:auto;
padding:48px 28px 60px;
}

.header{
text-align:center;
margin-bottom:60px;
}

.header-title{
font-family:"Cormorant Garamond",serif;
font-size:42px;
letter-spacing:.05em;
margin-bottom:14px;
}

.header-sub{
font-size:18px;
color:var(--gold);
letter-spacing:.1em;
}

.result{
display:grid;
grid-template-columns:1fr 1fr;
gap:36px;
align-items:center;
margin-bottom:60px;
}

.result img{
width:100%;
border:1px solid var(--gold-dim);
}

.result-text h2{
font-family:"Cormorant Garamond",serif;
font-size:36px;
margin-bottom:10px;
}

.result-text .read{
color:var(--gold);
margin-bottom:16px;
}

.desc{
font-size:14px;
line-height:1.9;
color:var(--text-mid);
margin-bottom:16px;
}

.mark{
font-size:14px;
line-height:1.8;
color:var(--text-mid);
border-top:1px solid var(--gold-dim);
padding-top:14px;
}

.message{
text-align:center;
font-size:18px;
line-height:1.8;
margin-top:30px;
}

.footer{
margin-top:60px;
display:flex;
align-items:center;
gap:10px;
}

.footer-line{
flex:1;
height:1px;
background:var(--gold);
opacity:.3;
}

.footer-text{
font-family:"Cormorant Garamond",serif;
font-size:12px;
letter-spacing:.4em;
color:var(--gold);
}

@media(max-width:700px){

.result{
grid-template-columns:1fr;
}

.header-title{
font-size:32px;
}

}

</style>
</head>


<body>

<div class="wrapper">

<div class="header">
<div class="header-title">FD名決定のお知らせ</div>
<div class="header-sub">JAYBIRDS（ジェイバーズ）💙🪶</div>
</div>


<div class="result">

<div>
<img src="jaybirds.jpg" alt="JAYBIRDS">
</div>

<div class="result-text">

<h2>JAYBIRDS</h2>
<div class="read">ジェイバーズ</div>

<div class="desc">
JAYBIRDは幸運の青い鳥・カケスを意味する実在する英単語。<br>
航空・トランスポート専攻、軽やかなダンス、目を引くビジュアル、<br>
そして台南から飛び立った南の鳥。<br>
そのすべてがジェイくんの姿と重なります。
</div>

<div class="mark">
💙はカケスの羽の青と空・航空を象徴する色。<br>
🪶は軽やかさと自由を表す羽根。
</div>

</div>

</div>


<div class="message">
南風とともに羽ばたくJAYBIRDSへ💙<br>
全員でジェイくんを世界へ届けよう！🪶
</div>


<div class="footer">

<div class="footer-line"></div>

<div class="footer-text">
Chuang Jay Fandom
</div>

<div class="footer-line"></div>

</div>


</div>

</body>
</html>
