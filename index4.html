<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FD名決定のお知らせ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
--bg:#14202E;
--gold:#C9A84C;
--gold-soft:rgba(201,168,76,0.25);
--text:#F0E8D4;
--text-soft:rgba(240,232,212,0.75);
}

body{
margin:0;
background:radial-gradient(circle at 30% 20%,#1c2f45,#14202E 70%);
font-family:"Noto Serif JP";
color:var(--text);
overflow-x:hidden;
}

.wrapper{
max-width:1050px;
margin:auto;
padding:70px 40px 80px;
position:relative;
}

/* 四点星 */

.star{
position:absolute;
opacity:.55;
}

.star svg{
display:block;
}

/* ヘッダー */

.header{
text-align:center;
margin-bottom:70px;
position:relative;
}

.header-title{
font-family:"Cormorant Garamond";
font-size:44px;
letter-spacing:.05em;
margin-bottom:18px;
}

.header-name{
font-family:"Cormorant Garamond";
font-size:40px;
color:var(--gold);
letter-spacing:.1em;
}

/* 結果レイアウト */

.result{
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
align-items:center;
}

/* 画像フレーム */

.image-frame{
position:relative;
padding:24px;
border:1px solid var(--gold-soft);
}

.image-frame:before{
content:"";
position:absolute;
top:10px;
left:10px;
right:10px;
bottom:10px;
border:1px solid rgba(201,168,76,.35);
}

.image-frame:after{
content:"";
position:absolute;
top:-6px;
left:-6px;
right:-6px;
bottom:-6px;
border:1px solid rgba(201,168,76,.15);
}

.image-frame img{
width:100%;
display:block;
}

/* テキスト */

.result h2{
font-family:"Cormorant Garamond";
font-size:36px;
margin-bottom:6px;
}

.read{
color:var(--gold);
letter-spacing:.2em;
margin-bottom:18px;
}

.desc{
line-height:1.9;
color:var(--text-soft);
margin-bottom:18px;
}

.mark{
border-top:1px solid var(--gold-soft);
padding-top:14px;
color:var(--text-soft);
}

/* メッセージ */

.message{
margin-top:80px;
text-align:center;
font-family:"Cormorant Garamond";
font-size:24px;
line-height:2.1;
}

/* フッター */

.footer{
margin-top:80px;
display:flex;
align-items:center;
gap:20px;
}

.footer-line{
flex:1;
height:1px;
background:var(--gold);
opacity:.3;
}

.footer-text{
font-family:"Cormorant Garamond";
letter-spacing:.35em;
font-size:12px;
color:var(--gold);
}

/* モバイル */

@media(max-width:700px){

.result{
grid-template-columns:1fr;
gap:40px;
}

.header-title{
font-size:32px;
}

.header-name{
font-size:28px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<!-- 四点星配置 -->

<div class="star" style="top:6%;left:8%">
<svg width="12" height="12" viewBox="0 0 12 12">
<path d="M6 0.5 L6.7 5.8 L6 11.5 L5.3 5.8 Z" fill="#C9A84C"/>
<path d="M0.5 6 L5.8 5.3 L11.5 6 L5.8 6.7 Z" fill="#C9A84C"/>
</svg>
</div>

<div class="star" style="top:18%;right:12%">
<svg width="18" height="18" viewBox="0 0 18 18">
<path d="M9 1 L10 8.5 L9 17 L8 8.5 Z" fill="#C9A84C"/>
<path d="M1 9 L8.5 8 L17 9 L8.5 10 Z" fill="#C9A84C"/>
<circle cx="9" cy="9" r="1" fill="#C9A84C"/>
</svg>
</div>

<div class="star" style="bottom:25%;left:10%">
<svg width="10" height="10" viewBox="0 0 10 10">
<path d="M5 0.3 L5.6 4.7 L5 9.7 L4.4 4.7 Z" fill="#C9A84C"/>
<path d="M0.3 5 L4.7 4.4 L9.7 5 L4.7 5.6 Z" fill="#C9A84C"/>
</svg>
</div>

<div class="star" style="bottom:12%;right:15%">
<svg width="14" height="14" viewBox="0 0 14 14">
<path d="M7 0.5 L7.8 6.5 L7 13.5 L6.2 6.5 Z" fill="#C9A84C"/>
<path d="M0.5 7 L6.5 6.2 L13.5 7 L6.5 7.8 Z" fill="#C9A84C"/>
</svg>
</div>


<!-- ヘッダー -->

<div class="header">

<div class="header-title">
FD名決定のお知らせ
</div>

<div class="header-name">
JAYBIRDS（ジェイバーズ）💙🪶
</div>

</div>


<!-- メイン -->

<div class="result">

<div class="image-frame">

<img src="jaybirds.jpg">

</div>

<div>

<h2>JAYBIRDS</h2>

<div class="read">
ジェイバーズ
</div>

<div class="desc">
JAYBIRDは幸運の青い鳥・カケスを意味する実在する英単語。<br>
航空・トランスポート専攻、軽やかなダンス、目を引くビジュアル、<br>
そして台南から飛び立った南の鳥。<br>
そのすべてがジェイくんの姿と重なります。
</div>

<div class="mark">
💙はカケスの羽の青と空・航空を象徴する色。<br>
🪶は軽やかさと自由を表す羽根。
</div>

</div>

</div>


<!-- メッセージ -->

<div class="message">

南風とともに羽ばたくJAYBIRDSへ💙<br>
全員でジェイくんを世界へ届けよう！🪶

</div>


<!-- フッター -->

<div class="footer">

<div class="footer-line"></div>

<div class="footer-text">
Chuang Jay Fandom
</div>

<div class="footer-line"></div>

</div>

</div>

</body>
</html>
