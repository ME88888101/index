<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
--bg:#14202E;
--gold:#C9A84C;
--text:#F0E8D4;
--text-soft:rgba(240,232,212,0.75);
}

body{
background:var(--bg);
color:var(--text);
font-family:"Noto Serif JP";
margin:0;
}

.wrapper{
max-width:1000px;
margin:auto;
padding:60px 30px;
}

/* タイトル */

.header{
text-align:center;
margin-bottom:50px;
}

.title{
font-family:"Cormorant Garamond";
font-size:42px;
margin-bottom:20px;
}

.name{
font-family:"Cormorant Garamond";
font-size:38px;
color:var(--gold);
letter-spacing:.08em;
}

/* 星 */

.star{
position:absolute;
opacity:.6;
}

.star svg{
display:block;
}

/* レイアウト */

.result{
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
align-items:center;
}

/* フレーム */

.image-frame{
position:relative;
padding:20px;
border:1px solid rgba(201,168,76,.4);
}

.image-frame:before{
content:"";
position:absolute;
top:8px;
left:8px;
right:8px;
bottom:8px;
border:1px solid rgba(201,168,76,.25);
}

.image-frame img{
width:100%;
display:block;
}

/* テキスト */

h2{
font-family:"Cormorant Garamond";
font-size:36px;
margin:0;
}

.read{
color:var(--gold);
margin-bottom:20px;
}

.desc{
line-height:1.9;
color:var(--text-soft);
margin-bottom:20px;
}

.mark{
border-top:1px solid rgba(201,168,76,.3);
padding-top:15px;
color:var(--text-soft);
}

/* メッセージ */

.message{
margin-top:70px;
text-align:center;
font-size:22px;
line-height:2;
}

/* モバイル */

@media(max-width:700px){

.result{
grid-template-columns:1fr;
}

.title{
font-size:32px;
}

.name{
font-size:26px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="header">

<div class="title">FD名決定のお知らせ</div>

<div class="name">✦ JAYBIRDS（ジェイバーズ）💙🪶 ✦</div>

</div>

<div class="result">

<div class="image-frame">

<img src="jaybirds.jpg">

</div>

<div>

<h2>JAYBIRDS</h2>

<div class="read">ジェイバーズ</div>

<div class="desc">

JAYBIRDは幸運の青い鳥・カケスを意味する実在する英単語。<br>

航空・トランスポート専攻、軽やかなダンス、目を引くビジュアル、<br>

そして台南から飛び立った南の鳥。<br>

そのすべてがジェイくんの姿と重なります。

</div>

<div class="mark">

💙はカケスの羽の青と空・航空を象徴する色。<br>
🪶は軽やかさと自由を表す羽根。

</div>

</div>

</div>

<div class="message">

✦ 南風とともに羽ばたくJAYBIRDSへ💙 ✦<br>
全員でジェイくんを世界へ届けよう！🪶

</div>

</div>

</body>
</html>
