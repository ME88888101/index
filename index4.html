<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ジュアン・ジェイ FD名決定</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
--bg:#14202E;
--gold:#C9A84C;
--gold-soft:rgba(201,168,76,0.3);
--text:#F0E8D4;
--text-mid:rgba(240,232,212,0.72);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--bg);
color:var(--text);
font-family:"Noto Serif JP",serif;
}

.wrapper{
max-width:1000px;
margin:auto;
padding:60px 30px 70px;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:60px;
}

.header-title{
font-family:"Cormorant Garamond",serif;
font-size:42px;
letter-spacing:.06em;
margin-bottom:16px;
}

.header-name{
font-family:"Cormorant Garamond",serif;
font-size:34px;
color:var(--gold);
letter-spacing:.08em;
}

/* RESULT */

.result{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:center;
margin-bottom:60px;
}

.result-image{
border:1px solid var(--gold-soft);
padding:10px;
}

.result-image img{
width:100%;
display:block;
}

.result-text h2{
font-family:"Cormorant Garamond",serif;
font-size:34px;
margin-bottom:8px;
}

.result-text .read{
font-size:14px;
letter-spacing:.2em;
color:var(--gold);
margin-bottom:20px;
}

.desc{
font-size:14px;
line-height:1.9;
color:var(--text-mid);
margin-bottom:20px;
}

.mark{
font-size:14px;
line-height:1.8;
color:var(--text-mid);
border-top:1px solid var(--gold-soft);
padding-top:16px;
}

/* MESSAGE */

.message{
margin-top:30px;
text-align:center;
font-size:20px;
line-height:2;
font-family:"Cormorant Garamond",serif;
}

/* FOOTER */

.footer{
margin-top:60px;
display:flex;
align-items:center;
gap:14px;
}

.footer-line{
flex:1;
height:1px;
background:var(--gold);
opacity:.25;
}

.footer-text{
font-family:"Cormorant Garamond",serif;
font-size:12px;
letter-spacing:.4em;
color:var(--gold);
}

/* MOBILE */

@media(max-width:700px){

.result{
grid-template-columns:1fr;
gap:28px;
}

.header-title{
font-size:32px;
}

.header-name{
font-size:26px;
}

}

</style>

</head>

<body>

<div class="wrapper">

<!-- HEADER -->

<div class="header">

<div class="header-title">
FD名決定のお知らせ
</div>

<div class="header-name">
JAYBIRDS（ジェイバーズ）💙🪶
</div>

</div>

<!-- RESULT -->

<div class="result">

<div class="result-image">
<img src="jaybirds.jpg" alt="JAYBIRDS">
</div>

<div class="result-text">

<h2>JAYBIRDS</h2>

<div class="read">
ジェイバーズ
</div>

<div class="desc">
JAYBIRDは幸運の青い鳥・カケスを意味する実在する英単語。<br>
航空・トランスポート専攻、軽やかなダンス、目を引くビジュアル、<br>
そして台南から飛び立った南の鳥。<br>
そのすべてがジェイくんの姿と重なります。
</div>

<div class="mark">
💙はカケスの羽の青と空・航空を象徴する色。<br>
🪶は軽やかさと自由を表す羽根。
</div>

</div>

</div>

<!-- MESSAGE -->

<div class="message">

南風とともに羽ばたくJAYBIRDSへ💙<br>
全員でジェイくんを世界へ届けよう！🪶

</div>

<!-- FOOTER -->

<div class="footer">

<div class="footer-line"></div>

<div class="footer-text">
Chuang Jay Fandom
</div>

<div class="footer-line"></div>

</div>

</div>

</body>
</html>
