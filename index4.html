<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">

<style>

:root{
--bg1:#0e1a26;
--bg2:#13283d;
--gold:#d4b057;
--text:#f3ead6;
--soft:rgba(243,234,214,0.7);
}

body{
margin:0;
background:radial-gradient(circle at center,var(--bg2),var(--bg1));
color:var(--text);
font-family:"Noto Serif JP";
}

/* 星空 */

body:before{
content:"";
position:fixed;
inset:0;
background-image:
radial-gradient(2px 2px at 20% 30%,#fff6 50%,transparent),
radial-gradient(2px 2px at 70% 60%,#fff6 50%,transparent),
radial-gradient(2px 2px at 40% 80%,#fff5 50%,transparent),
radial-gradient(1px 1px at 60% 20%,#fff6 50%,transparent),
radial-gradient(1px 1px at 85% 50%,#fff6 50%,transparent);
pointer-events:none;
}

/* 鳥シルエット */

body:after{
content:"🕊";
position:fixed;
font-size:260px;
opacity:.03;
top:10%;
right:8%;
}

/* レイアウト */

.wrapper{
max-width:1000px;
margin:auto;
padding:70px 30px;
position:relative;
}

/* タイトル */

.header{
text-align:center;
margin-bottom:60px;
}

.title{
font-family:"Cormorant Garamond";
font-size:44px;
margin-bottom:20px;
}

.name{
font-family:"Cormorant Garamond";
font-size:40px;
color:var(--gold);
letter-spacing:.08em;
}

/* 星 */

.star{
position:absolute;
font-size:40px;
color:var(--gold);
opacity:.9;
}

.star1{top:80px;left:40px}
.star2{top:150px;right:80px}
.star3{bottom:200px;left:70px}
.star4{bottom:120px;right:40px}

/* メイン */

.main{
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
align-items:center;
}

/* 画像フレーム */

.frame{
position:relative;
padding:25px;
border:1px solid rgba(212,176,87,.6);
}

.frame:before{
content:"";
position:absolute;
top:10px;
left:10px;
right:10px;
bottom:10px;
border:1px solid rgba(212,176,87,.4);
}

.frame:after{
content:"";
position:absolute;
top:20px;
left:20px;
right:20px;
bottom:20px;
border:1px solid rgba(212,176,87,.25);
}

.frame img{
width:100%;
display:block;
}

/* 羽 */

.feather{
position:absolute;
font-size:28px;
opacity:.5;
}

.f1{top:30%;left:-30px}
.f2{bottom:15%;right:-20px}

/* テキスト */

h2{
font-family:"Cormorant Garamond";
font-size:36px;
margin:0;
}

.read{
color:var(--gold);
margin-bottom:20px;
}

.desc{
line-height:1.9;
color:var(--soft);
margin-bottom:20px;
}

.note{
border-top:1px solid rgba(212,176,87,.3);
padding-top:15px;
color:var(--soft);
}

/* メッセージ */

.message{
text-align:center;
margin-top:80px;
font-size:22px;
line-height:2;
}

.footer{
text-align:center;
margin-top:60px;
color:var(--gold);
letter-spacing:.25em;
font-family:"Cormorant Garamond";
}

/* モバイル */

@media(max-width:700px){

.main{
grid-template-columns:1fr;
}

.title{font-size:32px}
.name{font-size:26px}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="star star1">✦</div>
<div class="star star2">✦</div>
<div class="star star3">✦</div>
<div class="star star4">✦</div>

<div class="header">

<div class="title">FD名決定のお知らせ</div>

<div class="name">
JAYBIRDS（ジェイバーズ） 💙🪶
</div>

</div>

<div class="main">

<div class="frame">

<img src="jaybirds.jpg">

<div class="feather f1">🪶</div>
<div class="feather f2">🪶</div>

</div>

<div>

<h2>JAYBIRDS</h2>

<div class="read">ジェイバーズ</div>

<div class="desc">

JAYBIRDは幸運の青い鳥・カケスを意味する実在する英単語。<br>

航空・トランスポート専攻、軽やかなダンス、目を引くビジュアル、<br>

そして台南から飛び立った南の鳥。<br>

そのすべてがジェイくんの姿と重なります。

</div>

<div class="note">

💙はカケスの羽の青と空・航空を象徴する色。<br>
🪶は軽やかさと自由を表す羽根。

</div>

</div>

</div>

<div class="message">

南風とともに羽ばたくJAYBIRDSへ 💙<br>
全員でジェイくんを世界へ届けよう！ 🪶

</div>

<div class="footer">

Chuang Jay Fandom

</div>

</div>

</body>
</html>
